<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selected Infrastructure Holding | FLY FASHION Cart</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-50 antialiased">
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 max-w-sm w-full"></div>

    <nav class="sticky top-0 z-40 w-full border-b border-slate-100 dark:border-slate-900 glass-nav flex items-center h-20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 w-full flex justify-between">
            <a href="index.html" class="text-2xl font-black tracking-tighter">FLY<span class="text-slate-400 font-light">FASHION</span></a>
            <a href="shop.html" class="text-xs uppercase font-bold tracking-widest flex items-center gap-2"><i data-lucide="arrow-left" class="w-4 h-4"></i> Continue Selection</a>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <h1 class="text-2xl font-black tracking-tight mb-8 uppercase">Your Selected Manifest</h1>
        <div class="flex flex-col gap-6">
            <div id="cart-items-container" class="flex flex-col gap-4"></div>
            
            <div id="cart-summary-card" class="bg-slate-50 dark:bg-slate-900 p-6 rounded-2xl border border-slate-100 dark:border-slate-800 hidden flex-col gap-4">
                <div class="flex justify-between items-center border-b border-slate-200 dark:border-slate-800 pb-4">
                    <span class="text-sm font-medium text-slate-500">Subtotal Asset Calculation</span>
                    <span id="cart-total-val" class="text-xl font-bold">₦0</span>
                </div>
                <button onclick="dispatchWhatsAppCheckout()" class="w-full py-4 bg-emerald-600 hover:bg-emerald-700 text-white font-bold tracking-wide rounded-xl shadow-md transition text-center text-sm">Compile & Checkout via WhatsApp Protocol</button>
            </div>

            <div id="cart-empty-state" class="hidden flex-col items-center justify-center py-20 text-center">
                <i data-lucide="shopping-cart" class="w-12 h-12 text-slate-300 mb-4"></i>
                <p class="text-sm font-medium text-slate-400">Bag framework is currently void of items.</p>
                <a href="shop.html" class="mt-4 px-6 py-2.5 bg-black text-white dark:bg-white dark:text-black rounded-xl text-xs font-bold tracking-wider uppercase">Initialize Shop Route</a>
            </div>
        </div>
    </main>

    <footer class="w-full border-t border-slate-100 dark:border-slate-900 py-12 bg-white dark:bg-slate-950 text-slate-500 text-xs text-center">
        Designed with ❤️ by <a href="https://visioreach.co" target="_blank" rel="noopener noreferrer" class="underline font-bold text-slate-700 dark:text-slate-300">VisioReach Concepts</a>
    </footer>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/cart.js"></script>
</body>
</html>
