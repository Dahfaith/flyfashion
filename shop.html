<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Assembly Pipeline | FLY FASHION Global Shop</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-white dark:bg-slate-950 text-slate-900 dark:text-slate-50 antialiased">
    <div id="toast-container" class="fixed bottom-6 right-6 z-[100] flex flex-col gap-3 max-w-sm w-full"></div>

    <nav class="sticky top-0 z-40 w-full border-b border-slate-100 dark:border-slate-900 glass-nav transition-all">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-20 flex items-center justify-between">
            <div class="flex items-center gap-8"><a href="index.html" class="text-2xl font-black tracking-tighter">FLY<span class="text-slate-400 font-light">FASHION</span></a>
                <div class="hidden md:flex items-center gap-6 text-xs uppercase font-semibold tracking-widest text-slate-600 dark:text-slate-300">
                    <a href="index.html" class="hover:text-black dark:hover:text-white transition">Home</a>
                    <a href="shop.html" class="text-black dark:text-white transition">Shop</a>
                    <a href="categories.html" class="hover:text-black dark:hover:text-white transition">Categories</a>
                    <a href="contact.html" class="hover:text-black dark:hover:text-white transition">Contact</a>
                </div>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-full transition"><i data-lucide="moon" class="w-5 h-5 dark:hidden"></i><i data-lucide="sun" class="w-5 h-5 hidden dark:block"></i></button>
                <a href="cart.html" class="p-2 relative text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-900 rounded-full transition"><i data-lucide="shopping-bag" class="w-5 h-5"></i><span class="cart-count absolute -top-1 -right-1 bg-black text-white dark:bg-white dark:text-black text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center">0</span></a>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
        <div class="flex flex-col md:flex-row gap-8">
            <aside class="w-full md:w-64 flex flex-col gap-6 shrink-0 border-r border-slate-100 dark:border-slate-900 pr-0 md:pr-6">
                <div>
                    <h3 class="text-xs uppercase tracking-widest font-bold text-slate-400 mb-2">Search Pipeline</h3>
                    <input type="text" id="search-input" placeholder="Query design pattern..." class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 text-sm bg-transparent focus:outline-none focus:border-black dark:focus:border-white">
                </div>
                <div>
                    <h3 class="text-xs uppercase tracking-widest font-bold text-slate-400 mb-2">Category Routing</h3>
                    <select id="category-filter" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-800 text-sm bg-transparent focus:outline-none focus:border-black dark:focus:border-white">
                        <option value="all">All Ecosystem Registries</option>
                        <option value="men">Men</option>
                        <option value="women">Women</option>
                        <option value="native-wears">Native Wears</option>
                        <option value="sneakers">Sneakers</option>
                        <option value="hoodies">Hoodies</option>
                        <option value="jerseys">Jerseys</option>
                    </select>
                </div>
                <div>
                    <h3 class="text-xs uppercase tracking-widest font-bold text-slate-400 mb-2">Max Valuation Framework</h3>
                    <div class="flex items-center gap-3">
                        <input type="range" id="price-range" min="10000" max="200000" step="5000" class="w-full accent-black dark:accent-white">
                        <span id="price-val" class="text-xs font-mono font-bold">₦200k</span>
                    </div>
                </div>
            </aside>

            <section class="flex-1">
                <div id="shop-grid" class="grid grid-cols-2 lg:grid-cols-3 gap-6"></div>
                <div id="empty-view" class="hidden flex-col items-center justify-center text-center py-24">
                    <i data-lucide="package-search" class="w-12 h-12 text-slate-300 mb-4"></i>
                    <p class="text-sm font-medium text-slate-400">Zero structural objects match specified filters.</p>
                </div>
            </section>
        </div>
    </main>

    <footer class="w-full border-t border-slate-100 dark:border-slate-900 py-12 bg-white dark:bg-slate-950 text-slate-500 text-xs text-center">
        Designed with ❤️ by <a href="https://visioreach.co" target="_blank" rel="noopener noreferrer" class="underline font-bold text-slate-700 dark:text-slate-300">VisioReach Concepts</a>
    </footer>

    <script src="assets/js/app.js"></script>
    <script src="assets/js/shop.js"></script>
</body>
</html>
